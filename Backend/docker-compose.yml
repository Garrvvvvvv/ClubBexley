version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: dockerfile
    container_name: arcevents-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: always
    mem_limit: 600m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
